<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Modern UI</title>
    <meta name="description" content="Join our platform today. Create a new account to unlock premium features and personalized experiences.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>
        <p>Sign up in seconds to get started on your journey.</p>
        <form action="#" method="post">
            <div class="inputBox">
                <input type="text" id="fullname" required="required">
                <span>Full Name</span>
            </div>
            <div class="inputBox">
                <input type="email" id="email" required="required">
                <span>Email Address</span>
            </div>
            <div class="inputBox">
                <input type="password" id="password" required="required">
                <span>Password</span>
            </div>
            <div class="inputBox">
                <input type="password" id="confirm_password" required="required">
                <span>Confirm Password</span>
            </div>

            <div class="links">
                <span>Already have an account?</span>
                <a href="index.html" class="signup-btn">Sign in</a>
            </div>

            <input type="submit" value="Register Now">
        </form>
    </div>
</body>
</html>
